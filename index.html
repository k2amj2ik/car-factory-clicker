<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>태영이 자동차공장</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(160deg, #fff3e0 0%, #ffccbc 100%);
      min-height: 100vh; margin: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; color: #555; padding: 24px;
    }
    h1 { color: #e53935; font-size: 26px; text-align: center; margin: 0 0 6px; }
    p.sub { margin: 0 0 14px; color: #888; }
    a.btn {
      display: block; width: 260px; max-width: 80vw; text-align: center;
      padding: 20px; border-radius: 18px; background: #fff;
      box-shadow: 0 6px 16px rgba(0,0,0,.15); color: #e53935; font-weight: bold;
      text-decoration: none; font-size: 18px; transition: .15s;
    }
    a.btn:active { transform: scale(.97); }
    a.btn .tag { display: block; font-size: 13px; color: #999; font-weight: normal; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>🚗 태영이 자동차공장 🏭</h1>
  <p class="sub">하고 싶은 게임을 골라요!</p>
  <a class="btn" href="./1/">게임 1<span class="tag">클래식</span></a>
  <a class="btn" href="./2/">게임 2<span class="tag">광산 + 공장 (신작)</span></a>
</body>
</html>
