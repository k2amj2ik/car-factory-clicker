<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>태영이 자동차공장</title>
  <style>
    * { box-sizing: border-box; touch-action: manipulation; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
      background: linear-gradient(160deg, #fff3e0 0%, #ffccbc 100%);
      background-attachment: fixed;
      color: #444; user-select: none; -webkit-user-select: none;
      min-height: 100vh;
    }
    #app { max-width: 480px; margin: 0 auto; padding: 10px 12px 40px; }

    /* 상단바 */
    #topbar {
      display: flex; justify-content: space-between; gap: 6px;
      background: #fff; border-radius: 14px; padding: 12px 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.10); font-weight: bold; font-size: 15px;
      position: sticky; top: 8px; z-index: 20;
    }
    #topbar span { white-space: nowrap; }

    /* 탭 */
    #tabs { display: flex; gap: 8px; margin: 12px 0; }
    #tabs button {
      flex: 1; padding: 12px 0; border: none; border-radius: 12px; cursor: pointer;
      background: #ffffffcc; color: #888; font-weight: bold; font-size: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,.08); transition: .15s;
    }
    #tabs button.active { background: #e53935; color: #fff; transform: translateY(-1px); }

    /* 카드 */
    .card {
      background: #fff; border-radius: 16px; padding: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,.10); margin-bottom: 12px;
    }
    .card h3 { margin: 0 0 10px; color: #e53935; font-size: 16px; }
    .card p { margin: 6px 0; font-size: 14px; line-height: 1.5; }
    .muted { color: #999; font-size: 13px; }

    /* 버튼 */
    button.act {
      border: none; border-radius: 12px; padding: 10px 14px; cursor: pointer;
      background: #ff7043; color: #fff; font-weight: bold; font-size: 14px;
      box-shadow: 0 3px 8px rgba(255,112,67,.4); margin: 4px 4px 0 0;
    }
    button.act:active { transform: scale(.97); }
    button.ghost { background: #fff; color: #e53935; border: 2px solid #ffccbc; box-shadow: none; }
    button.act:disabled { background: #ccc; box-shadow: none; cursor: default; }

    .big {
      display: block; width: 100%; padding: 26px 0; font-size: 22px; margin: 8px 0;
      border: none; border-radius: 18px; cursor: pointer; font-weight: bold; color: #fff;
      background: radial-gradient(circle at 50% 30%, #ff8a65, #e53935);
      box-shadow: 0 6px 18px rgba(229,57,53,.4);
    }
    .big:active { transform: scale(.97); }

    /* 게이지 */
    .gauge { height: 14px; background: #ffe0d4; border-radius: 8px; overflow: hidden; margin: 8px 0; }
    .gauge > i { display: block; height: 100%; background: #ff7043; transition: width .1s; }

    /* 부품 저장고 그리드 */
    .parts { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 8px; }
    .parts div { text-align: center; font-size: 13px; background: #fff7f3; border-radius: 10px; padding: 6px 0; }
    .parts div b { display: block; font-size: 18px; }

    /* 시세 */
    .price { font-size: 20px; color: #e53935; font-weight: bold; }
    .up { color: #2e7d32; } .down { color: #c62828; }

    /* 토스트 */
    #toast {
      position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(40px);
      background: #1a1a1a; color: #fff; padding: 11px 18px; border-radius: 22px;
      font-size: 14px; opacity: 0; transition: .25s; z-index: 50; max-width: 90%; text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,.3); pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* 부품 생산 pop */
    @keyframes pop { 0%{transform:scale(.4);opacity:0} 50%{transform:scale(1.2);opacity:1} 100%{transform:scale(1);opacity:1} }
    .pop { animation: pop .3s; }

    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
    .lock { text-align: center; padding: 10px; }
    .lock .icon { font-size: 48px; }
    .count { font-size: 26px; font-weight: bold; color: #333; }

    /* ===== 공장 생산 라인 ===== */
    .factory-floor {
      background: linear-gradient(180deg, #455a64 0%, #37474f 100%);
      border-radius: 16px; padding: 14px 12px; color: #eceff1; margin-bottom: 12px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.15);
    }
    .factory-floor h3 { color: #ffd54f; margin: 0 0 12px; font-size: 15px; }
    .stage { display: flex; align-items: center; gap: 6px; }
    .station {
      flex: 0 0 auto; width: 70px; text-align: center;
      background: #263238; border: 2px solid #546e7a; border-radius: 12px; padding: 8px 2px;
    }
    .station .face { font-size: 26px; line-height: 1; }
    .station .lbl { font-size: 10px; color: #b0bec5; margin-top: 3px; }
    .station .num { font-size: 13px; font-weight: bold; color: #ffd54f; }
    .station.active .face { animation: work .8s ease-in-out infinite; }
    @keyframes work { 0%,100%{transform:translateY(0) rotate(-3deg)} 50%{transform:translateY(-3px) rotate(3deg)} }

    /* 컨베이어 벨트 */
    .belt {
      flex: 1 1 auto; height: 26px; position: relative; overflow: hidden;
      background: #212121; border-top: 3px solid #616161; border-bottom: 3px solid #616161; border-radius: 4px;
    }
    .belt::before {
      content: ''; position: absolute; inset: 0;
      background: repeating-linear-gradient(90deg, #424242 0 10px, #303030 10px 20px);
      animation: beltmove .6s linear infinite;
    }
    .belt.stopped::before { animation: none; opacity: .5; }
    @keyframes beltmove { from{background-position:0 0} to{background-position:20px 0} }
    .belt .item {
      position: absolute; top: 50%; transform: translateY(-50%); font-size: 16px;
      animation: ride 2.4s linear infinite;
    }
    @keyframes ride { from{left:-12%} to{left:108%} }
    .belt.stopped .item { animation-play-state: paused; opacity:.4; }

    /* 부품 선반 */
    .shelf { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 10px; }
    .shelf div { text-align: center; font-size: 11px; background: #263238; border-radius: 8px; padding: 5px 0; color:#cfd8dc; }
    .shelf div b { display: block; font-size: 16px; color:#fff; }
    .shelf div.empty { opacity: .35; }

    /* 생산 통계 패널 */
    .stats { display: flex; justify-content: space-around; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .stat { text-align: center; flex: 1; min-width: 70px; }
    .stat .v { font-size: 17px; font-weight: bold; color: #fff; }
    .stat .k { font-size: 11px; color: #b0bec5; }
    .control { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
    .control button { flex:1; min-width:130px; }

    /* ===== 광산 채굴 장면 ===== */
    .mine-scene {
      position: relative; height: 230px; border-radius: 16px; overflow: hidden;
      background: radial-gradient(circle at 50% 38%, #6d4c41 0%, #4e342e 45%, #3e2723 100%);
      box-shadow: inset 0 0 50px rgba(0,0,0,.65); cursor: pointer; margin-top: 8px;
      border: 3px solid #3e2723;
    }
    .mine-scene::after { /* 동굴 바위 질감 */
      content:''; position:absolute; inset:0; opacity:.18; pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%, #000 0 6px, transparent 7px),
        radial-gradient(circle at 70% 60%, #000 0 8px, transparent 9px),
        radial-gradient(circle at 85% 25%, #000 0 5px, transparent 6px),
        radial-gradient(circle at 35% 75%, #000 0 7px, transparent 8px);
    }
    .mine-scene .depthlbl { position:absolute; top:8px; left:12px; color:#bcaaa4; font-size:12px; letter-spacing:1px; }
    .mine-scene .rock { position:absolute; left:50%; top:54%; transform:translate(-50%,-50%); font-size:96px; filter: drop-shadow(0 6px 6px rgba(0,0,0,.5)); }
    .mine-scene.hit .rock { animation: rockshake .18s; }
    @keyframes rockshake { 0%,100%{transform:translate(-50%,-50%)} 30%{transform:translate(-54%,-50%) rotate(-5deg) scale(.97)} 70%{transform:translate(-46%,-50%) rotate(5deg)} }
    .mine-scene .tool { position:absolute; right:22%; top:14%; font-size:50px; transform-origin:90% 90%; transform: rotate(-35deg); filter: drop-shadow(0 3px 3px rgba(0,0,0,.5)); }
    .mine-scene.hit .tool { animation: swing .18s ease-in; }
    @keyframes swing { 0%{transform:rotate(-35deg)} 55%{transform:rotate(22deg)} 100%{transform:rotate(-35deg)} }
    .mine-scene .hint { position:absolute; bottom:10px; width:100%; text-align:center; color:#d7ccc8; font-size:13px; font-weight:bold; text-shadow:0 1px 2px #000; }
    .mine-scene.hit .hint { opacity:.4; }
    .chip { position:absolute; font-size:22px; pointer-events:none; animation: fly .7s ease-out forwards; z-index:5; }
    @keyframes fly { 0%{opacity:1; transform:translateY(0) scale(1)} 100%{opacity:0; transform:translate(var(--dx,0), -70px) scale(.5)} }
    .flash { position:absolute; inset:0; background:radial-gradient(circle,#fff8 0%,transparent 60%); pointer-events:none; animation: flash .35s ease-out forwards; }
    @keyframes flash { from{opacity:.9} to{opacity:0} }

    /* ===== 인트로(로그인) ===== */
    #intro {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #fff3e0 0%, #ffccbc 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; padding: 28px; text-align: center;
    }
    #intro h1 { color: #e53935; font-size: 26px; margin: 0; }
    #intro .emoji { font-size: 56px; }
    #intro p { color: #888; margin: 0; font-size: 14px; }
    .name-input {
      font-size: 18px; text-align: center; border: 2px solid #ffab91; border-radius: 12px;
      padding: 13px 16px; width: 260px; max-width: 80vw; outline: none;
    }
    .name-input:focus { border-color: #e53935; }
    #introStart {
      border: none; border-radius: 14px; padding: 15px 40px; font-size: 18px; font-weight: bold;
      color: #fff; background: #e53935; box-shadow: 0 6px 16px rgba(229,57,53,.4); cursor: pointer;
    }
    #introStart:active { transform: scale(.97); }

    /* ===== 토글 스위치 ===== */
    .toggle { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-weight: bold; }
    .toggle .sw { width: 46px; height: 26px; border-radius: 13px; background: #ccc; position: relative; transition: .2s; flex: 0 0 auto; }
    .toggle .sw::after { content:''; position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 3px rgba(0,0,0,.3); }
    .toggle.on .sw { background: #66bb6a; }
    .toggle.on .sw::after { left: 23px; }
    .danger { background: #b71c1c !important; box-shadow: 0 3px 8px rgba(183,28,28,.4) !important; }
  </style>
</head>
<body>
  <div id="intro">
    <div class="emoji">🚗🏭</div>
    <h1>태영이 자동차공장</h1>
    <p>광산에서 광물을 캐서 자동차를 만들어요!</p>
    <input id="nameInput" maxlength="12" placeholder="이름을 적어요 (예: 태영이)" class="name-input" />
    <button id="introStart">시작하기 ▶</button>
  </div>
  <div id="app" style="display:none">

    <header id="topbar">
      <span id="money">💰 0원</span>
      <span id="bag">🎒 0/10</span>
      <span id="garage">🚗 0/10</span>
    </header>
    <nav id="tabs">
      <button data-tab="mine" class="active">⛏️ 광산</button>
      <button data-tab="factory">🏭 공장</button>
      <button data-tab="shop">🛒 상점</button>
    </nav>
    <main>
      <section id="tab-mine" class="tab"></section>
      <section id="tab-factory" class="tab" hidden></section>
      <section id="tab-shop" class="tab" hidden></section>
    </main>
  </div>
  <div id="toast"></div>

<script>
/* ===================== STATE ===================== */
const KEY = 'taeyoung_factory_v2';
const PART_TYPES = ['타이어','엔진','차체','핸들','유리','범퍼','시트','헤드라이트','배터리','브레이크'];
const PART_ICON = {타이어:'🛞',엔진:'⚙️',차체:'🚙',핸들:'🎡',유리:'🪟',범퍼:'🛡️',시트:'💺',헤드라이트:'💡',배터리:'🔋',브레이크:'🛑'};

function defaultState(){
  return {
    playerName: '',
    autoMineOn: true,
    money: 100,
    bag: [], bagCap: 10,
    garage: [], garageCap: 10,
    partsStock: PART_TYPES.reduce((o,t)=>(o[t]=0,o),{}),
    factory: 'locked',          // locked | repairing_paid | repairing | running
    repairEnd: 0,
    processBots: 0, processIdx: 0,
    assembleBots: 0,
    autoMiners: 0,
    mineralPrice: 30, mineralPrev: 30,
    carPrice: 300, carPrev: 300,
    nextPriceAt: 0,
    clicks: 0,
    upgrades: { pick:0, bag:0, botspeed:0, luck:0, garage:0, autominer:0 },
    milestones: {},
    lastSeen: Date.now()
  };
}
let S = load();

/* ===================== PERSIST ===================== */
function load(){
  try { const r = JSON.parse(localStorage.getItem(KEY));
        if(!r) return defaultState();
        const d = defaultState(); Object.assign(d, r);
        d.partsStock = Object.assign(defaultState().partsStock, r.partsStock||{});
        d.upgrades = Object.assign(defaultState().upgrades, r.upgrades||{});
        return d;
  } catch(e){ return defaultState(); }
}
function save(){ S.lastSeen = Date.now(); try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

/* ===================== PRICES ===================== */
const MIN_LO=10, MIN_HI=50, CAR_LO=200, CAR_HI=600, PRICE_PERIOD=60000;
function priceAfter(price, lo, hi){
  const delta = price * (Math.random()*0.30 - 0.15);
  return Math.min(hi, Math.max(lo, Math.round(price + delta)));
}
function stepPrices(now){
  if(S.nextPriceAt===0) S.nextPriceAt = now + PRICE_PERIOD;
  let changed=false;
  while(now >= S.nextPriceAt){
    S.mineralPrev = S.mineralPrice; S.carPrev = S.carPrice;
    S.mineralPrice = priceAfter(S.mineralPrice, MIN_LO, MIN_HI);
    S.carPrice     = priceAfter(S.carPrice, CAR_LO, CAR_HI);
    S.nextPriceAt += PRICE_PERIOD; changed=true;
  }
  return changed;
}

/* ===================== MINING ===================== */
function clicksPerBox(){ return Math.max(1, 5 - S.upgrades.pick); }
function gemChance(){ return 0.10 + 0.01*S.upgrades.luck; }
function sellPrice(item){ return item.type==='gem' ? S.mineralPrice*5 : S.mineralPrice; }
function addToBag(item){
  if(S.bag.length >= S.bagCap){
    const old = S.bag.shift();
    S.money += Math.round(sellPrice(old) * 0.5);
    toast('가방이 꽉 차 '+(old.type==='gem'?'보석':'광물')+' 1개가 50%에 자동 판매됐어요');
  }
  S.bag.push(item);
}
function mineClick(){
  let got=false, gem=false;
  S.clicks++;
  if(S.clicks >= clicksPerBox()){
    S.clicks = 0; got=true;
    addToBag({type:'mineral'});
    if(Math.random() < gemChance()){ addToBag({type:'gem'}); gem=true; toast('💎 보석을 발견했어요!'); }
  }
  save(); liveUpdate();
  return {got, gem};
}
function mineTap(){
  const scene=document.getElementById('mineScene'); if(!scene){ mineClick(); return; }
  const r = mineClick();
  scene.classList.remove('hit'); void scene.offsetWidth; scene.classList.add('hit');
  setTimeout(()=>scene.classList.remove('hit'),180);
  const chip=document.createElement('span'); chip.className='chip';
  chip.textContent = r.gem ? '💎' : (r.got ? '🪨' : '✦');
  chip.style.left=(42+Math.random()*16)+'%'; chip.style.top=(46+Math.random()*8)+'%';
  chip.style.setProperty('--dx', (Math.random()*40-20)+'px');
  scene.appendChild(chip); setTimeout(()=>chip.remove(),720);
  if(r.got){ const f=document.createElement('div'); f.className='flash'; scene.appendChild(f); setTimeout(()=>f.remove(),360); }
}
function sellOne(type){
  const i = S.bag.findIndex(x=>x.type===type);
  if(i<0){ toast('팔 '+(type==='gem'?'보석':'광물')+'이 없어요'); return; }
  const it = S.bag.splice(i,1)[0]; S.money += sellPrice(it);
  save(); render();
}
function sellAll(type){
  let n=0; for(let i=S.bag.length-1;i>=0;i--){ if(S.bag[i].type===type){ S.money+=sellPrice(S.bag[i]); S.bag.splice(i,1); n++; } }
  if(n) toast(n+'개 판매 완료'); else toast('팔 게 없어요');
  save(); render();
}

/* ===================== FACTORY & ROBOTS ===================== */
const HOUR=3600000;
function unlockFactory(){ if(S.factory!=='locked')return; if(S.money<100){toast('100원이 필요해요');return;} S.money-=100; S.factory='repairing_paid'; save(); render(); }
function startRepair(){
  if(S.factory!=='repairing_paid')return; if(S.money<50){toast('수리비 50원이 필요해요');return;}
  S.money-=50;
  const hrs = 1 + Math.floor(Math.random()*24);
  S.repairEnd = Date.now() + hrs*HOUR;
  S.factory='repairing'; save(); render();
  toast('정비사 호출! 약 '+hrs+'시간 뒤 가동돼요');
}
function repairRemain(now){ return Math.max(0, S.repairEnd - now); }
function factoryReady(now){
  if(S.factory==='repairing' && now>=S.repairEnd){ S.factory='running'; toast('🏭 공장이 가동을 시작했어요!'); }
  return S.factory==='running';
}
function fmtDur(ms){ const s=Math.ceil(ms/1000); const h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=s%60; return (h?h+'시간 ':'')+(m?m+'분 ':'')+ss+'초'; }

function buyProcessBot(){ if(S.factory!=='running'){toast('공장 가동 후 구매 가능');return;} if(S.money<100){toast('100원이 필요해요');return;} S.money-=100; S.processBots++; save(); render(); }
function buyAssembleBot(){ if(S.factory!=='running'){toast('공장 가동 후 구매 가능');return;} if(S.money<100){toast('100원이 필요해요');return;} S.money-=100; S.assembleBots++; save(); render(); }

function addToGarage(){
  if(S.garage.length >= S.garageCap){
    S.garage.shift(); S.money += Math.round(S.carPrice*0.5);
    toast('차고가 꽉 차 자동차 1대가 50%에 자동 판매됐어요');
  }
  S.garage.push({ts:Date.now()});
}
function botInterval(){ return Math.max(0.2, 1 - 0.1*S.upgrades.botspeed); }
// 분수 생산분 누적(carry) — 실시간 작은 dt에서도 누락 없이 생산
let procCarry=0, asmCarry=0, mineCarry=0;
function runProduction(seconds){
  const made = {parts:0, cars:0};
  if(S.factory!=='running') return made;
  const rate = 1/botInterval();
  procCarry += S.processBots * rate * seconds;
  while(procCarry >= 1){
    const mi = S.bag.findIndex(x=>x.type==='mineral'); if(mi<0){ procCarry=Math.min(procCarry,1); break; }
    S.bag.splice(mi,1);
    const t = PART_TYPES[S.processIdx % PART_TYPES.length]; S.processIdx++;
    S.partsStock[t]++; made.parts++; procCarry -= 1;
  }
  asmCarry += S.assembleBots * rate * seconds;
  while(asmCarry >= 1){
    if(!PART_TYPES.every(t=>S.partsStock[t]>=1)){ asmCarry=Math.min(asmCarry,1); break; }
    PART_TYPES.forEach(t=>S.partsStock[t]--);
    addToGarage(); made.cars++; asmCarry -= 1;
  }
  return made;
}
function sellCar(){ if(!S.garage.length){toast('자동차가 없어요');return;} S.garage.shift(); S.money+=S.carPrice; save(); render(); }
function sellAllCars(){ const n=S.garage.length; if(!n){toast('자동차가 없어요');return;} S.money+=n*S.carPrice; S.garage=[]; toast(n+'대 판매!'); save(); render(); }

/* ===================== AUTO MINER ===================== */
function autoMineInterval(){ return 3; }
function runMining(seconds){
  if(S.autoMiners<=0 || !S.autoMineOn) return 0;
  mineCarry += S.autoMiners * seconds / autoMineInterval();
  let n=0;
  while(mineCarry >= 1){ addToBag({type:'mineral'}); if(Math.random()<gemChance()) addToBag({type:'gem'}); mineCarry-=1; n++; }
  return n;
}

/* ===================== SHOP ===================== */
const UPG = {
  pick:     {name:'좋은 곡갱이', icon:'⛏️', desc:'채광에 필요한 클릭 수 감소', base:50,  max:4},
  bag:      {name:'큰 가방',     icon:'🎒', desc:'가방 +5칸',                base:80,  max:20},
  botspeed: {name:'빠른 로봇',   icon:'⚡', desc:'가공·조립 로봇 속도 ↑',    base:200, max:8},
  luck:     {name:'행운·품질',   icon:'🍀', desc:'보석 등장 확률 +1%',       base:150, max:10},
  garage:   {name:'차고 확장',   icon:'🏬', desc:'차고 +5대',                base:120, max:20},
  autominer:{name:'자동 채굴 로봇', icon:'🤖', desc:'클릭 없이 광물 자동 채굴 (오프라인 포함)', base:300, max:50}
};
function upgradeCost(key){ return Math.round(UPG[key].base * Math.pow(1.6, S.upgrades[key])); }
function buyUpgrade(key){
  const u=UPG[key]; if(S.upgrades[key]>=u.max){toast('최대 레벨이에요');return;}
  const c=upgradeCost(key); if(S.money<c){toast(c+'원이 필요해요');return;}
  S.money-=c; S.upgrades[key]++;
  if(key==='bag') S.bagCap+=5;
  if(key==='garage') S.garageCap+=5;
  if(key==='autominer') S.autoMiners++;
  toast(u.name+' 구매!'); save(); render();
}
function toggleAutoMine(){
  S.autoMineOn = !S.autoMineOn;
  toast(S.autoMineOn ? '🤖 자동 채굴 ON' : '✋ 자동 채굴 OFF — 직접 캐보세요!');
  save(); render();
}
function resetGame(){
  if(!confirm('정말 게임을 처음부터 다시 시작할까요?\n모은 돈·로봇·업그레이드가 모두 사라져요.')) return;
  try{ localStorage.removeItem(KEY); }catch(e){}
  location.reload();
}

/* ===================== MILESTONES ===================== */
function checkMilestones(){
  const ms=[
    ['firstCar', ()=>S.garage.length>=1, '🎉 첫 자동차 완성!'],
    ['bots5', ()=>S.processBots+S.assembleBots>=5, '🏭 로봇 5대 돌파!'],
    ['rich', ()=>S.money>=10000, '💎 자산 1만원 달성!']
  ];
  ms.forEach(([k,cond,msg])=>{ if(!S.milestones[k]&&cond()){ S.milestones[k]=true; toast(msg);} });
}

/* ===================== OFFLINE ===================== */
function settleOffline(){
  const now = Date.now();
  const elapsed = Math.max(0, (now - S.lastSeen)/1000);
  if(elapsed < 2) return null;
  factoryReady(now);
  const mined = runMining(elapsed);
  const made  = runProduction(elapsed);
  S.lastSeen = now; save();
  if(mined===0 && made.parts===0 && made.cars===0) return null;
  return {elapsed, mined, parts:made.parts, cars:made.cars};
}

/* ===================== RENDER ===================== */
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400); }

function showTab(name){
  document.querySelectorAll('.tab').forEach(s=>s.hidden = (s.id !== 'tab-'+name));
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  render();
}
function arrow(cur, prev){ if(cur>prev) return '<span class="up">▲</span>'; if(cur<prev) return '<span class="down">▼</span>'; return ''; }

function renderTop(){
  document.getElementById('money').textContent = '💰 '+Math.floor(S.money).toLocaleString()+'원';
  document.getElementById('bag').textContent = '🎒 '+S.bag.length+'/'+S.bagCap;
  document.getElementById('garage').textContent = '🚗 '+S.garage.length+'/'+S.garageCap;
}

      <button class="act" id="unlock">100원에 인수하기</button></div>`;

        </div>

        <div class="shelf" id="lv_shelf">${shelf}</div>

        <div class="stage" style="margin-top:10px">
          <div class="station ${hasSet?'active':''}" id="lv_stSet"><div class="face">🧰</div><div class="lbl">부품세트</div><div class="num" id="lv_setN">${hasSet?'준비':'대기'}</div></div>
          <div class="belt ${belt2on?'':'stopped'}" id="lv_belt2a">${beltItems('⚙️')}</div>
          <div class="station ${belt2on?'active':''}" id="lv_stAsm"><div class="face">🤖</div><div class="lbl">조립</div><div class="num" id="lv_asmN">${S.assembleBots}대</div></div>
          <div class="belt ${belt2on?'':'stopped'}" id="lv_belt2b">${beltItems('🚗')}</div>
          <div class="station ${S.garage.length>0?'active':''}" id="lv_stGar"><div class="face">🚗</div><div class="lbl">차고</div><div class="num" id="lv_garN">${S.garage.length}/${S.garageCap}</div></div>

function renderShop(){
  const cards = Object.keys(UPG).map(key=>{
    const u=UPG[key], lv=S.upgrades[key], maxed=lv>=u.max, cost=upgradeCost(key);
    return `<div class="card">
      <h3>${u.icon} ${u.name} <span class="muted">Lv.${lv}/${u.max}</span></h3>
      <p>${u.desc}</p>
      <button class="act" data-up="${key}" ${maxed?'disabled':''}>${maxed?'최대 레벨':cost+'원에 구매'}</button>
    </div>`;
  }).join('');
  const el = document.getElementById('tab-shop');
  el.innerHTML = `<div class="card"><h3>🛒 상점</h3><p class="muted">효율 장비와 자동 채굴 로봇을 살 수 있어요. 살수록 가격이 올라가요.</p></div>`
    + cards
    + `<div class="card">
         <h3>⚙️ 설정</h3>
         <p class="muted" id="lv_who">플레이어: <b>${S.playerName||'-'}</b></p>
         <button class="act danger" id="resetBtn">🗑️ 게임 처음부터 다시</button>
         <p class="muted">모은 돈·로봇·업그레이드가 모두 사라지고 처음으로 돌아가요.</p>
       </div>`;
  el.querySelectorAll('[data-up]').forEach(b=>b.onclick=()=>buyUpgrade(b.dataset.up));
  document.getElementById('resetBtn').onclick = resetGame;
}

function render(){
  renderTop();
  if(!document.getElementById('tab-mine').hidden) renderMine();
  if(!document.getElementById('tab-factory').hidden) renderFactory();
  if(!document.getElementById('tab-shop').hidden) renderShop();
}

// 틱마다 호출: innerHTML 재생성 없이 숫자·상태만 갱신 (CSS 애니메이션 보존)
function setTxt(id,v){ const e=document.getElementById(id); if(e&&e.textContent!==''+v) e.textContent=v; }
function tog(id, cls, on){ const e=document.getElementById(id); if(e) e.classList.toggle(cls, on); }
function liveUpdate(){
  if(!document.getElementById('tab-mine').hidden){
    const m = S.bag.filter(x=>x.type==='mineral').length, g = S.bag.filter(x=>x.type==='gem').length;
    setTxt('lv_mPrice', S.mineralPrice+'원'); setTxt('lv_gPrice', (S.mineralPrice*5)+'원');
    const ar=document.getElementById('lv_mArrow'); if(ar) ar.innerHTML=arrow(S.mineralPrice,S.mineralPrev);
    const gz=document.getElementById('lv_gauge'); if(gz) gz.style.width=Math.round(100*S.clicks/clicksPerBox())+'%';
    setTxt('lv_clk', S.clicks); setTxt('lv_min', m); setTxt('lv_gem', g);
    setTxt('lv_bagHdr', '🎒 가방 ('+S.bag.length+'/'+S.bagCap+')');
  }
  if(!document.getElementById('tab-factory').hidden && S.factory==='running'){
    const rate=1/botInterval();
    const minerals=S.bag.filter(x=>x.type==='mineral').length;
    const hasSet=PART_TYPES.every(t=>S.partsStock[t]>=1);
    const belt1on=S.processBots>0&&minerals>0, belt2on=S.assembleBots>0&&hasSet;
    setTxt('lv_minerals', minerals); setTxt('lv_procN', S.processBots+'대'); setTxt('lv_asmN', S.assembleBots+'대');
    setTxt('lv_setN', hasSet?'준비':'대기'); setTxt('lv_garN', S.garage.length+'/'+S.garageCap);
    tog('lv_belt1','stopped',!belt1on); tog('lv_belt2a','stopped',!belt2on); tog('lv_belt2b','stopped',!belt2on);
    tog('lv_stMin','active',minerals>0); tog('lv_stProc','active',belt1on);
    tog('lv_stSet','active',hasSet); tog('lv_stAsm','active',belt2on); tog('lv_stGar','active',S.garage.length>0);
    const sh=document.getElementById('lv_shelf');
    if(sh) sh.innerHTML=PART_TYPES.map(t=>`<div class="${S.partsStock[t]>0?'':'empty'}">${PART_ICON[t]}<b>${S.partsStock[t]}</b>${t}</div>`).join('');
    setTxt('lv_mineR',((S.autoMineOn?S.autoMiners:0)/autoMineInterval()).toFixed(1)+'/s');
    setTxt('lv_procR',(S.processBots*rate).toFixed(1)+'/s');
    setTxt('lv_asmR',(S.assembleBots*rate).toFixed(1)+'/s');
    setTxt('lv_garHdr','🚗 차고 출고 ('+S.garage.length+'/'+S.garageCap+')');
    setTxt('lv_carPrice', S.carPrice+'원'); const ca=document.getElementById('lv_carArrow'); if(ca) ca.innerHTML=arrow(S.carPrice,S.carPrev);
    setTxt('lv_sellN', S.garage.length);
  }
}

/* ===================== BOOT & LOOP ===================== */
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>showTab(b.dataset.tab));

let lastTick = Date.now();
let lastFactory = S.factory;
function tick(){
  const now = Date.now();
  const dt = (now - lastTick)/1000; lastTick = now;
  stepPrices(now);
  factoryReady(now);
  runMining(dt);
  runProduction(dt);
  checkMilestones();
  renderTop();
  if(S.factory !== lastFactory){ lastFactory = S.factory; render(); return; }   // 상태 전환 시 전체 재구성
  if(S.factory==='repairing' && !document.getElementById('tab-factory').hidden){
    const cd=document.getElementById('cd'); if(cd) cd.textContent=fmtDur(repairRemain(now));
  }
  liveUpdate();
}

// 인트로(로그인) → 시작하기
let gameStarted = false;
function startGame(){
  const n = document.getElementById('nameInput').value.trim();
  if(!n){ alert('이름을 적어줘요!'); return; }
  S.playerName = n; save();
  document.getElementById('intro').style.display = 'none';
  document.getElementById('app').style.display = '';
  if(gameStarted) return;
  gameStarted = true;
  const off = settleOffline();
  lastTick = Date.now();
  render();
  if(off){ setTimeout(()=>toast(`${S.playerName}님, 그새 광물 ${off.mined} · 부품 ${off.parts} · 자동차 ${off.cars}대 생산했어요!`), 500); }
  setInterval(tick, 200);
  setInterval(save, 5000);
  window.addEventListener('beforeunload', save);
}
document.getElementById('introStart').onclick = startGame;
document.getElementById('nameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') startGame(); });
if(S.playerName) document.getElementById('nameInput').value = S.playerName;  // 이어하기: 이름 미리 채움
// iOS 핀치 줌 차단
document.addEventListener('gesturestart',  e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());

  unlockFactory, startRepair, factoryReady, repairRemain,
  buyProcessBot, buyAssembleBot, runProduction, addToGarage, sellCar, sellAllCars,
  runMining, upgradeCost, buyUpgrade, settleOffline, render,
  toggleAutoMine, resetGame, startGame
};
